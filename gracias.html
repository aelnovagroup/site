<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Solicitud Recibida! | AEL Nova Group</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Fuentes corporativas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES GLOBALES AEL --- */
        :root {
            --color-azul: #142136;
            --color-dorado: #edb612;
            --color-blanco: #ffffff;
            --color-gris-claro: #f8f9fa;
            --color-texto: #444444;
            --fuente-titulos: 'Times New Roman', Times, serif;
            --fuente-textos: 'Outfit', sans-serif;
        }

        /* --- RESET Y ESTILOS BASE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--fuente-textos);
            background-color: var(--color-gris-claro);
            color: var(--color-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- DISEÑO DE LA TARJETA --- */
        .tarjeta-gracias {
            background: var(--color-blanco);
            max-width: 550px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 4px; /* Bordes ligeramente cuadrados como la principal */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            border-top: 5px solid var(--color-dorado);
        }

        .icono-check {
            width: 80px;
            height: 80px;
            background-color: rgba(237, 182, 18, 0.1); /* Dorado transparente */
            color: var(--color-dorado);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
        }

        .icono-check svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        h1 {
            font-family: var(--fuente-titulos);
            font-size: 2.5rem;
            color: var(--color-azul);
            margin-bottom: 15px;
            font-weight: normal;
        }

        p {
            font-size: 1.05rem;
            color: var(--color-texto);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* --- BOTÓN CORPORATIVO (Mismo estilo que index.html) --- */
        .btn-dorado {
            display: inline-block;
            background-color: var(--color-dorado);
            color: var(--color-azul);
            padding: 15px 40px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-dorado:hover {
            background-color: #d19e0b;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="tarjeta-gracias">
        <div class="icono-check">
            <!-- Icono de verificación SVG -->
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
        </div>
        <h1>¡Información Recibida!</h1>
        <p>Gracias por contactar con <strong>AEL Nova Group</strong>. Nuestro equipo revisará los detalles de tu solicitud y se comunicará contigo a la brevedad posible.</p>
        
        <a href="index.html" class="btn-dorado">Volver al Inicio</a>
    </div>

</body>
</html>
